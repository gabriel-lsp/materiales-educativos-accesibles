name: Fix contacto en generador de silabas

on:
  push:
    paths:
      - ".github/workflows/fix-contacto-silabas.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-contacto-silabas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Agregar pestaña Contacto en generador de silabas
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('conciencia-fonologica.html')
          text = path.read_text(encoding='utf-8')
          old = '''      <a class="enlace-cabecera" href="index.html">
        Volver al inicio
      </a>'''
          new = '''      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;">
        <a class="enlace-cabecera" href="index.html">
          Volver al inicio
        </a>
        <a class="enlace-cabecera" href="contacto.html">
          Contacto
        </a>
      </div>'''
          inicio = text.find('<nav class="navegacion"')
          fin = text.find('</nav>', inicio)
          cabecera = text[inicio:fin] if inicio != -1 and fin != -1 else ''
          if old in text and 'href="contacto.html"' not in cabecera:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
              print('Pestaña Contacto agregada en conciencia-fonologica.html')
          else:
              print('No se hicieron cambios: el bloque no se encontró o Contacto ya existe.')
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Sin cambios para confirmar"
          else
            git add conciencia-fonologica.html
            git commit -m "Agregar pestaña Contacto en generador de sílabas"
            git push
          fi
